<html>
    <script>
        // 특정한(토큰) 문자를 기준으로 분리하기 split("토큰")==> 배열 
        var phone = "김학생,박학생,이학생,신학생"

        var na = phone.split(","); // "," 기준으로 분리해서 배열에 저장
        document.write("학생수 : " + na.length);
        document.write("이름 : " + na + "<br>");
        
        for(var i=0; i<na.length; i++){
            document.write(na[i] + "<br>");
        }
    </script>
</html>
