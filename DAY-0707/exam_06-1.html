<html>
    <script>
        var arr = [1,3,4,5,6,2,3,43,5,6,2,];

        // 1. 배열 요소를 모두 출력 후 합게 출력
        // 예시) 1 7 3 . . . = XXX

        var sum=0;
        for(var i=0; i<arr.length; i++){
            document.write(arr[i] + " ");
            sum += arr[i];
        }
        document.write("=" + sum + "<br>");

        // 2. 배열 요소의 값중에서 홀수만 출력 후 합계
        // 1 3 3 5 . . . = XXX
        for(var i=0; i<arr.length; i++){
            if(arr[i]%2==1){
            document.write(arr[i] + " ");
            sum += arr[i];
            }
        }
        document.write("=" + sum + "<br>");

</script>
</html>
