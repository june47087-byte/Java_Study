<html>
    <script>
        var arr = [70,90,50,85,77,53,78];

        // 1. 전체 출력
        // 2. 최대값, 최소값, 갑계- 최대-최소
        document.write("전체 :" +arr +"<br>");
        var max = arr[0];
        var min = arr[0];
        var sum = 0;
        for(var i=0; i<arr.length; i++){
            sum += arr[i];
            if(max < arr[i]){
                max = arr[i];
            }else if(min > arr[i]){
                min= arr[i];
            }
        }
        document.write("최대값 : " +max + "<br>");
        document.write("최소값 : " +min + "<br>");
        document.write("최대값 : " +(sum-max-min) + "<br>");

        
    </script>
</html>
