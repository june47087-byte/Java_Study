<html>
    <script>
        var value = [7,8,3,5,8,3,6,8];
        
        // 최대값을 찾아서 반환
        var max = valueMax(value);
        document.write("최대값 : " + max + "<br>");

        // 최소값을 찾아서 반환
        var min = valueMin(value);
        document.write("최소값 : " + min + "<br>");

        function valueMax(arr){
            var maxNum = arr[0]; 
            for(var i=1; i<arr.length; i++){
                if(maxNum < arr[i]){
                    maxNum = arr[i];
                }
            }
            return maxNum; 
        }

        function valueMin(arr){
            var minNum = arr[0];
            for(var i=1; i<arr.length; i++){
                if(minNum > arr[i]){
                    minNum = arr[i];
                }
            }
            return minNum; 
        }
    </script>
</html>
