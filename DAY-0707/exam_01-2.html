<html>
    <script>
        // if(), switch ~ case // swicth ~ case, do ~ while 파이썬에 없음 알아봐야함, 
        // 제어문 안에 제어문이 들어감 switch안에는 독립 변수 연산식  //
        // for(), while(), do~while()
        // 키보드로 1 ~ 3 사이의 정수를 입력
        // 1 이면 1 ~ 10까지 정수 출력
        // 2 이면 10 ~ 1 까지 정수 출력
        // 3 이면 1 ~ 10까지의 합계를 출력
        // 1. 입력 작업
        while(true){
            var menu = eval(prompt("정수를(1~3)를 입력"));
            
            switch(menu){
                case 1:
                    for(var i=1; i<=10; i++){
                        document.write(i + " ");
                    }
                    document.write("<br>");
                    alert("아무키나 누르세요.");
                    break;
                case 2:
                    for(var i=10; i>=1; i--){
                        document.write(i + " ");
                    }
                    document.write("<br>");
                    alert("아무키나 누르세요.");
                    break;
                case 3:
                    var sum=0;
                    for(var i=1; i<=10; i++){
                        sum = sum + i;//sum+=i;
                    }
                    document.write("1~10 합 : " + sum + "<br>");
                    alert("아무키나 누르세요.");
                    break;
                case 4:
                    document.write("프로그램을 종료합니다.");
                    var sw = 1; 
                    break;
                default:
                    document.write("입력오류입니다.");
            } //switch()끝
            if(sw==1){
                break;    
            }
        }    
    </script>
</html>
