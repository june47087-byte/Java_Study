<html>
    <script>
        var arr = [10,80,45,33,78,49,50,90,67];
        // 함수 호출
        total(arr);
        // 배열 요소를 모두 출력 후 합계 평균을 출력하는 함수 만들기
        /* total(); 이라는 함수 만들기 
            출력결과
            Data : 10 80 45 . . . 
            합계 : XXX
            평균 : xx.xx
        */
        

        function total(arr){
            var sum = 0;
            document.write("Data : ");
            for(var i=0; i<arr.length; i++){
                document.write(arr[i] + " "); 
                sum += arr[i];                
            }
            document.write("<br>");
            document.write("합계 : " + sum + "<br>");
            var ave = sum/arr.length;
            document.write("평균 : " + ave + "<br>")         

        }

    </script>
</html>
