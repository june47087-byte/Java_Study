<html>
    <script>
        // 키보드로 주민번호를 입력 성별검사 promt로 받은건 문자열로 인식
        // 000922-3234567 (1,3,5), (2,4,6)
        var jumin = prompt("주민번호를 입력(-포함해서 적어주세요.)");
        
        var m = jumin.substring(7, 8);
        if(m == '1' || m == '3' || m == '5'){
            document.write("남자입니다");
        }else {
            document.write("여자입니다");
        }
    </script>
</html>
