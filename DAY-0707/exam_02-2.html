<html>
    <script>
        // 다중 반복문(행열 계산할 때 주로 쓰인다.)
        /*      12345
            1:      *  
            2:     **
            3:    ***
            4:   ****
            5:  *****
        */
            for(var i=1; i<=5; i++){
                for(var k=1; k<=5-i; k++){
                    document.write("&nbsp");
                }
                for(j=1; j<=i; j++){
                    document.write("*")
                }
                document.write("<br>");
            }

        /*      12345
            1:  *****  
            2:   ****
            3:    ***
            4:     **
            5:      *
        */
        for(var i=1; i<=5; i++){
                for(var k=1; k<i; k++){
                    document.write("&nbsp");
                }
                for(j=1; j<=6-i; j++){
                    document.write("*")
                }
                document.write("<br>");
            }
            document.write("<br>");
    </script>
</html>
