<html>
    <script>
        var a = eval(prompt("입력: "));
        sum(a);


// 지역변수이다. 아무데나 S 집어 넣는다고 아래 함수의 s가 나오지 않는다. 
// 필요한 함수를 저장해서 꺼내다 쓰는것 개인의 함수를 만든 이유다.
        function sum(m){
            var s =0;
            for(i=1; i<=m; i++){
                document.write(i + "<br>");
                s + i;
            }
            document.write(1 + " ~ " + m + " 합계 " +s);
        }
    </script>
</html>
