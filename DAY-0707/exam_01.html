<html>
    <script>
        // if(), switch ~ case // swicth ~ case, do ~ while 파이썬에 없음 알아봐야함, 
        // 제어문 안에 제어문이 들어감  //
        // for(), while(), do~while()
        // 키보드로 1 ~ 3 사이의 정수를 입력
        // 1 이면 1 ~ 10까지 정수 출력
        // 2 이면 10 ~ 1 까지 정수 출력
        // 3 이면 1 ~ 10까지의 합계를 출력
        // 1. 입력 작업
        var menu = eval(prompt("정수를(1~3)를 입력"));
        
        if(menu==1){ //1이면
            for(var i=1; i<=10; i++){
                document.write(i + " ");
            }
            document.write("<br>");
        }else if (menu==2){ //아니면 2
            for(var x=10; x>=1; x--){
                document.write(x + " ");
            }
            document.write("<br>");
        }else if (menu==3){ //아니면 3
            var sum=0;// 합계계산용
            for(var y=1; y<=10; y++){
                sum += y;//sum=sum+y
            }
            document.write("1~10 합계 :" + sum + "<br>");
        }else{
            document.write("입력오류입니다.")
        }
    </script>
</html>
