<html>
    <script>
        function exam1(a){
            document.write("a=" + a + "<br>");
        }

        function exam2(a,b){
            var c = a + b;
            document.write("c=" + c + "<br>");
        }

        function exam3(){
        // 반환값의 유무(함수 결과 값을 줄거냐 말거냐), 예시 return 값; 
        // return은 함수를 끝내는 기능이기도 하다 } 같은거다.

            return 100;
        }

        // 함수 호출
        exam1(100);
        exam2(10,30);

        var s = exam3();
        document.write("s=" + s);
    </script>
</html>
