<script>
    /* 키보드로 정수를 입력 1~ 입력된 정수까지의 합계를 반환하는 
        프로그램 작성(단, 입력된 값이 0이면 프로그램을 종료)

        정수입력 : 10 
        1 ~ 10 합 : 55
        정수입력 : 20
        1 ~ 20 합 : 210 
        정수입력 : 0
    */

    while(true){
        var num = eval(prompt("정수입력"));
        if(num==0){
            break;
        }
        // 함수 호출
        var sum = exam(num);
        document.write("1 ~ " + num + "합= " +sum + "<br>");
    }    
    // 끝

    function exam(num){
        var s = 0;
        for(var i=1; i<=num; i++){
            s += i
        }
        return s;
    }

</script>
