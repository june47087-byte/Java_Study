<html>
    <script>
        /*   12345 반복문 2개 쓰는 법 공부중 
           1  *
          2  **
          3  ***
          4  ****
          5  *****
        */
        for(var i=1; i<=5; i++){
            for(var j=1; j<=i; j++){
                document.write("*");
            }
            document.write("<br>");
        }
        /*    54321 
            1:*****
            2:****
            3:***
            4:**
            5:*
        */                
        document.write("----------------<br>");
        for(var i=1; i<=5; i++){
            for(j=1; j<=6-i; j++){
                document.write("*");
            }
            document.write("<br>");
        }
    </script>
</html>
