<html>
    <script>
        // 문자열 분리하기 => 문자열. substring(index1, index2);
        // index1 시작위치, index2 전까지(문자열도 시작점은 0~이다, (0,5)면 0~4표시다.) 
        str="Korea_2026-MNU";
        //   01234567890123
        document.write("문자열 길이 : " + str.length +"<br>");
        k = str.substring(0, 5); // 0번부터 5번 전까지
        y = str.substring(11); // 11번째부터 끝까지
        document.write("K = " + k + "<br>");
        document.write("y = " + y + "<br>");

    </script>
</html>
