<html>
    <script>
        // 다중 반복문(행열 계산할 때 주로 쓰인다.)
        /*    12345
            1:*****  
            2:*****
            3:*****
            4:*****
            5:*****
        */
        // 단일 for()문
        for(var i=1; i<=25; i++){
            document.write("*");
            if(i%5==0){
                document.write("<br>");
            }
        }
        document.write("------------------<br>");
        // 다중 for()
        for(var i=1; i<=5; i++){ //줄(행)
            document.write(i + ":")
            for(j=1; j<=5; j++){ //칸(열)
                document.write("*");
            }
            document.write("<br>");
        }
        // i=1 
        // j
    </script>
</html>
