<html>
    <script>

        /* a 배열과 값 a는 다르다 a[0]=100 이고 a= 500이라고 하면 확실히 적어야한다
        참조에 의한 호출법이라 한다 이건 배열을 써야한다. 이것도 제미나이 한테 물어보기
        */
        // 함수 호출 법(값에 의한 호출 / 참조에 의한 호출);
        var a = [100,200]; // 배열
        document.write("a[0]="+[0]+", a[1]="+a[1]+"<br>");
        // 함수 호출
        swap(a);
        document.write("a[0]="+[0]+", a[1]="+a[1]+"<br>");

        function swap(a){
            var c = a[0];
            a[0] = a[1];
            a[1] = c;
        }
        
    </script>
</html>
