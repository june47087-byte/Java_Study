<html>
    <script>
        // 배열 만들기
        var a = new Array(5) // 일반 변수가 아닌 배열 변수 a라는 이름으로 5개 연결 파이썬처럼 0~4 순서
        // 배열에 값 저장
        a[0]=10;
        a[1]=20;
        a[2]=30;
        a[3]=40;
        a[4]=50;
        // a[5]=60://자바스크립트에서는 허용 그러나 자바는X 그러니 5개면 0~4까지만
        document.write("a 배열 :" + a + "<br>");
        document.write("0번 요소 출력 : " +a[0] + "<br>");
        document.write("1번 요소 출력 : " +a[1] + "<br>");

        var tot = a[0] + a[1] + a[2] + a[3] + a[4];
        document.write("합계 :" +tot + "<br>");

        document.write("a배열 요소수(길이)합계 : " + a.length + "<br>"); //lenght는 배열의 길이다.
        
        // 배열 요소 합계 계산 배열 이름은 = 쓰면 안되고 <(작다)만 써야한다. =하면 0~4 인데 0~5가 되버린다
        var sum=0;
        for(var i=0; i<a.length; i++){
            document.write(a[i] + "<br>");//배열 요소 출력
            sum += a[i];//요소 합계
        }
        document.write("합계 : " + sum);
    </script>
</html>
