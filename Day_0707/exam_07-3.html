<html>
    <script>
        // 주민번호를 입력 받아서 성별을 구하여 출력
        // 단 주민번호는 13자리가 입력되어야 한다.
        var jumin; // 주민번호 변수
        while(true){
            jumin = prompt("주민번호를 입력하세요");
            if(jumin.length==14){
                break;
            }
            alert("주민번호 오류");
        }

        if(jumin.substring(7,8) == '1' || jumin.substring(7,8) == '3' || jumin.substring(7,8) == '5'){
            document.write("남자입니다.");
        }else{
            document.write("여자입니다.")
        }
    </script>
</html>
