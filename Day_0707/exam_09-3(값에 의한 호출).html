<html>
    <script>


/*위에서 a에 100을 넣고 b에 200을 넣었다 그래서 함수 swap을 만들었는데 그럼 아래 var c의 결과는 a와 b의 방향이 바뀐다. 
그런데 아래 function부분에서만 바뀐다. 이런걸 값에 의한 호출이라한다. 변수이름이 같은건 의미가 없다. 
아래쪽으로 값만 준다는거다. 이해가 잘 되지 않아 제미나이에게 물어 볼 것. 그럼 위쪽의 swap ab 쪽에서 wirte는 어떻게 해야 바뀔까?
swap(a) swap(b)로는 안된다.
*/
        // 함수 호출 법(값에의한 호출 / 참조에 의한 호출);
        var a = 100;
        var b = 200;
        document.write("a=" + a + ",b=" + b + "<br>");
        // 함수 호출
        swap(a,b); // 두 변수의 값 변경    
        document.write("a=" + a + ",b=" + b + "<br>");

        function swap(a,b){
            // 함수에 새로운 값을 넣을 때는 아래처럼
            var c = a;
            a = b;
            b = c;


        }
    </script>
</html>
