<html>
    <script>
        // 사용자 정의 함수 만들기 (만들때는 function 적기 아래의 test()가 함수다)
        // 매개변수가 없는 경우
        // 매개변수가 있는 경우
        // 반환값의 유무(함수 결과 값을 줄거냐 말거냐), 예시 return 값;
        function test(){
            document.write("test() 함수가 호출되었습니다.");
        }

        // 함수 호출 (호출하기 전까지 동작이 안 된다.)
        document.write("함수 호출 전 <br>")
        test();

    </script>
</html>
